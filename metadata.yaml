name: astrbot_plugin_nitter_tweets
display_name: Nitter 推文记录
desc: "[多平台接入开发中] Nitter 推文记录 - 支持 QQ (aiocqhttp)、Telegram、Feishu (Lark) 以及微信 OC (weixin_oc)；通过 Nitter RSS 获取公开推文和媒体，支持手动查询与定时推送。"
version: 0.8.0
description: 通过可配置的 Nitter 实例轮询指定用户 RSS，将最近公开推文发送到聊天会话；支持手动查询和独立的 Nitter 镜像站测试命令；QQ/aiocqhttp 可按推文数量阈值使用 OneBot v11 Node/Nodes 合并转发，飞书/Lark、Telegram、微信 OC 和其他平台始终普通逐账号发送；飞书逐账号发送时会优先使用原生 post 同框发送正文和图片。可通过 xdown 解析并发送图片附件，视频/GIF 附件默认关闭并保留原帖链接；支持全局定时配置和自定义 tweet_groups 分组，每个分组可单独配置关注账号、推送目标、间隔检查和每日定点；可清理重复订阅作者；可调用 AstrBot 已配置大模型翻译非中文推文，并按概率追加 AI 评论与识图描述。
author: shitianyaa
astrbot_version: ">=4.16.0"
repo: https://github.com/shitianyaa/astrbot_plugin_nitter_tweets
support_platforms:
  - aiocqhttp
  - telegram
  - lark
  - weixin_oc
keywords:
  - twitter
  - x
  - nitter
  - tweet
  - 推文
  - 合并转发
  - 图片
  - 视频
  - 翻译
  - 大模型
  - 识图
  - AI评论
  - 定时推送
