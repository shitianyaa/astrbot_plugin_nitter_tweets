name: astrbot_plugin_nitter_tweets
version: 0.6.3
display_name: Nitter 推文记录
desc: 通过 Nitter RSS 获取指定用户公开推文和媒体，支持手动查询与定时推送。
description: 通过可配置的 Nitter 实例轮询指定用户 RSS，将最近公开推文发送到聊天会话；OneBot v11 可使用合并转发，飞书/Lark 优先使用原生 text 消息发送正文，其他平台使用普通消息链。可通过 xdown 解析并发送图片附件，视频/GIF 附件默认关闭并保留原帖链接；支持按间隔或每日定点检查关注账号并推送新推文，可合并本轮更新并清理重复订阅作者；可调用 AstrBot 已配置大模型翻译非中文推文，并按概率追加 AI 评论与识图描述。
author: shitianyaa
repo: https://github.com/shitianyaa/astrbot_plugin_nitter_tweets
platform_support:
  - aiocqhttp
  - lark
  - weixin
  - telegram
keywords:
  - twitter
  - x
  - nitter
  - tweet
  - 推文
  - 合并转发
  - 图片
  - 视频
  - 翻译
  - 大模型
  - 识图
  - AI评论
  - 定时推送
