<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nitter 推文面板</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app" class="shell">
      <aside class="rail">
        <div class="brand">
          <div class="brand-logo"><span>NT</span></div>
          <div>
            <h2 class="brand-title">Nitter Dispatch</h2>
            <p class="brand-subtitle">推文监控调度台</p>
          </div>
        </div>

        <section class="rail-panel" aria-label="运行监控状态">
          <h3 class="rail-panel-title">运行监控状态</h3>
          <div class="health-list">
            <div class="health-item">
              <span class="health-name">推文调度器</span>
              <span id="railSchedulerStatus" class="status-badge">
                <span class="dot"></span>
                未加载
              </span>
            </div>
            <div class="health-item">
              <span class="health-name">后台检查</span>
              <span id="railScheduleStatus" class="status-badge">
                <span class="dot"></span>
                未加载
              </span>
            </div>
            <div class="health-item">
              <span class="health-name">暂存队列</span>
              <span id="railPendingStatus" class="status-badge">
                <span class="dot"></span>
                未加载
              </span>
            </div>
            <div class="health-item">
              <span class="health-name">异常目标</span>
              <span id="railTargetStatus" class="status-badge">
                <span class="dot"></span>
                未加载
              </span>
            </div>
          </div>
        </section>

        <nav class="tabs nav" aria-label="页面导航">
          <button class="tab active" type="button" data-view="overview">
            <span class="nav-label">
              <span class="icon" data-icon="play"></span>
              控制台总览
            </span>
          </button>
          <button class="tab" type="button" data-view="groups">
            <span class="nav-label">
              <span class="icon" data-icon="plus"></span>
              分组订阅管理
            </span>
          </button>
          <button class="tab" type="button" data-view="pending">
            <span class="nav-label">
              <span class="icon" data-icon="send"></span>
              暂存发布队列
            </span>
          </button>
          <button class="tab" type="button" data-view="history">
            <span class="nav-label">
              <span class="icon" data-icon="refresh"></span>
              最近推送历史
            </span>
          </button>
          <button class="tab" type="button" data-view="mirror">
            <span class="nav-label">
              <span class="icon" data-icon="probe"></span>
              镜像连通诊断
            </span>
          </button>
          <button class="tab" type="button" data-view="cleanup">
            <span class="nav-label">
              <span class="icon" data-icon="erase"></span>
              系统维护清理
            </span>
          </button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="title-block">
            <span class="kicker">PLUGIN CONSOLE</span>
            <h1 id="currentTabTitle">Nitter 推文控制台总览</h1>
            <p id="currentTabDesc">聚合查看博主订阅分组、推送目标状态、暂存队列以及 Nitter 节点连通性。</p>
          </div>
          <div class="topbar-actions">
            <button id="themeToggleBtn" class="theme-toggle-pill" type="button" title="切换亮色/暗色">
              <span class="theme-toggle-slider"></span>
              <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
              </svg>
              <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"></path>
              </svg>
            </button>
            <span id="lastUpdated" class="timestamp">未加载</span>
            <button id="refreshBtn" class="button secondary" type="button">
              <span class="icon" data-icon="refresh"></span>
              刷新
            </button>
          </div>
        </header>

        <div id="alert" class="alert" role="status" hidden></div>

        <section id="overviewView" class="view active" aria-label="概览"></section>

        <section id="groupsView" class="view" aria-label="分组订阅">
          <div class="groups-layout">
            <section id="groupSwitcher" class="panel group-switcher" aria-label="用户分组切换">
              <div class="panel-head">
                <h2>用户分组</h2>
                <button id="createGroupBtn" class="button primary small" type="button">
                  <span class="icon" data-icon="plus"></span>
                  新建分组
                </button>
              </div>
              <div id="groupList" class="group-list"></div>
            </section>
            <section id="groupEditor" class="group-editor" aria-label="分组详情"></section>
          </div>
        </section>

        <section id="pendingView" class="view" aria-label="暂存队列">
          <div class="toolbar">
            <label class="field compact">
              <span>分组</span>
              <select id="pendingGroupSelect"></select>
            </label>
            <button id="pendingRefreshBtn" class="button secondary" type="button">
              <span class="icon" data-icon="refresh"></span>
              刷新队列
            </button>
            <button id="publishSelectedBtn" class="button primary" type="button">
              <span class="icon" data-icon="send"></span>
              发布暂存
            </button>
          </div>
          <div id="pendingContent" class="stack"></div>
        </section>

        <section id="historyView" class="view" aria-label="最近推送">
          <div class="toolbar">
            <label class="field compact">
              <span>分组</span>
              <select id="historyGroupSelect"></select>
            </label>
            <label class="field compact">
              <span>博主</span>
              <input id="historyUsername" type="text" placeholder="NASA" />
            </label>
            <label class="field compact">
              <span>数量</span>
              <input id="historyLimit" type="number" min="1" max="50" value="10" />
            </label>
            <button id="historyRefreshBtn" class="button secondary" type="button">
              <span class="icon" data-icon="refresh"></span>
              查询
            </button>
            <div class="pager" aria-label="最近推送翻页">
              <button id="historyPrevBtn" class="button secondary small" type="button">
                上一页
              </button>
              <span id="historyPageLabel" class="pager-label">第 1 页</span>
              <button id="historyNextBtn" class="button secondary small" type="button">
                下一页
              </button>
            </div>
          </div>
          <div id="historyContent" class="stack"></div>
        </section>

        <section id="mirrorView" class="view" aria-label="镜像测试">
          <div class="split">
            <form id="mirrorForm" class="panel form-panel">
              <h2>镜像测试</h2>
              <div class="form-grid">
                <label class="field">
                  <span>用户名</span>
                  <input id="mirrorUsername" type="text" value="nasa" />
                </label>
                <label class="field">
                  <span>数量</span>
                  <input id="mirrorLimit" type="number" min="1" max="200" value="5" />
                </label>
                <label class="field wide">
                  <span>临时镜像 URL</span>
                  <input id="mirrorInstance" type="url" placeholder="https://nitter.net" />
                </label>
              </div>
              <button id="mirrorProbeBtn" class="button primary" type="submit">
                <span class="icon" data-icon="probe"></span>
                测试镜像
              </button>
            </form>
            <div class="panel">
              <h2>Nitter 实例</h2>
              <div id="instanceList" class="chip-list"></div>
            </div>
          </div>
          <div id="mirrorResult" class="stack"></div>
        </section>

        <section id="cleanupView" class="view" aria-label="缓存清理">
          <div class="cleanup-grid">
            <div class="panel danger-zone">
              <div class="panel-head">
                <h2>媒体缓存</h2>
                <span class="badge">保留暂存媒体</span>
              </div>
              <button id="clearCacheBtn" class="button danger" type="button">
                <span class="icon" data-icon="trash"></span>
                清理媒体缓存
              </button>
              <div id="cacheResult" class="result-line"></div>
            </div>
            <div class="panel danger-zone">
              <div class="panel-head">
                <h2>推送记录</h2>
                <span class="badge warning">可能重新处理旧推文</span>
              </div>
              <label class="field">
                <span>范围</span>
                <select id="seenGroupSelect"></select>
              </label>
              <button id="clearSeenBtn" class="button danger" type="button">
                <span class="icon" data-icon="erase"></span>
                清理推送记录
              </button>
              <div id="seenResult" class="result-line"></div>
            </div>
          </div>
        </section>
      </main>

      <div
        id="confirmDialog"
        class="dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="confirmTitle"
        aria-describedby="confirmDesc"
        hidden
      >
        <div class="dialog-panel">
          <button id="cancelConfirmBtnIcon" class="dialog-close" type="button" aria-label="关闭">×</button>
          <p id="confirmKicker" class="kicker">确认操作</p>
          <h2 id="confirmTitle">确认执行？</h2>
          <div id="confirmDesc" class="dialog-desc"></div>
          <div class="dialog-actions">
            <button id="cancelConfirmBtn" class="button secondary" type="button">取消</button>
            <button id="confirmActionBtn" class="button danger" type="button">确认</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
